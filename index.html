<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Protocolo de Suplementacion · Zentum</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0fa589">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Suplementos">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<style>
  :root{
    --bg:#eef2f8; --bg2:#e6ecf4;
    --card:#ffffff; --card2:#fbfcfe;
    --ink:#101a2c; --txt2:#586477; --txt3:#94a0b2;
    --line:#e9eef5;
    --acc:#0fa589; --acc-d:#0b8a72; --acc-soft:#e7f6f2; --acc-line:#c3e9e0;
    --r-card:22px; --r-item:16px;
    --sh-sm:0 1px 2px rgba(16,26,44,.05);
    --sh:0 2px 6px rgba(16,26,44,.05), 0 16px 34px -20px rgba(16,26,44,.22);
    --sh-lg:0 3px 10px rgba(16,26,44,.06), 0 26px 50px -24px rgba(16,26,44,.28);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg)}
  body{
    font-family:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
    color:var(--ink);min-height:100vh;line-height:1.5;
    padding:28px 16px 60px;
    background:
      radial-gradient(900px 460px at 50% -10%, #ffffff, transparent 62%),
      radial-gradient(720px 420px at 90% 6%, #eafaf5, transparent 60%),
      linear-gradient(180deg,var(--bg),var(--bg2));
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:600px;margin:0 auto}

  /* Top */
  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding:0 4px}
  .brand{display:flex;align-items:center;gap:13px}
  .logo{
    width:46px;height:46px;border-radius:14px;flex-shrink:0;
    background:linear-gradient(150deg,var(--acc),var(--acc-d));
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 10px 22px -8px rgba(15,165,137,.6), inset 0 1px 0 rgba(255,255,255,.25);
  }
  .logo svg{width:24px;height:24px;stroke:#fff;stroke-width:2.3;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .brand h1{font-family:'Manrope',sans-serif;font-size:17px;font-weight:800;letter-spacing:-.3px;color:var(--ink)}
  .brand p{font-size:11px;color:var(--txt3);font-weight:700;margin-top:2px;letter-spacing:.4px;text-transform:uppercase}
  .date-chip{font-size:12px;color:var(--txt2);font-weight:600;text-align:right;text-transform:none;max-width:120px;line-height:1.35}
  .date-chip::first-letter{text-transform:uppercase}

  /* Hero */
  .hero{
    background:var(--card);border:1px solid var(--line);border-radius:var(--r-card);
    padding:26px 26px 24px;box-shadow:var(--sh-lg);margin-bottom:16px;position:relative;overflow:hidden;
  }
  .hero::before{content:"";position:absolute;inset:0;background:radial-gradient(440px 210px at 10% -35%, var(--acc-soft), transparent 70%);pointer-events:none}
  .hero-grid{display:flex;align-items:center;gap:26px;position:relative}
  .ring-wrap{position:relative;width:132px;height:132px;flex-shrink:0}
  .ring-wrap svg{transform:rotate(-90deg)}
  .ring-bg{stroke:#eaf0f7}
  .ring-fg{stroke:url(#grad);stroke-linecap:round;transition:stroke-dashoffset .8s cubic-bezier(.34,1.1,.4,1);filter:drop-shadow(0 4px 8px rgba(15,165,137,.28))}
  .ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring-pct{font-family:'Manrope',sans-serif;font-size:33px;font-weight:800;letter-spacing:-1.5px;line-height:1;color:var(--ink);font-variant-numeric:tabular-nums}
  .ring-lbl{font-size:10px;color:var(--txt3);font-weight:800;text-transform:uppercase;letter-spacing:1.2px;margin-top:6px}
  .hero-meta{flex:1;display:flex;flex-direction:column;gap:16px;min-width:0}
  .phase-pill{
    align-self:flex-start;display:inline-flex;align-items:center;gap:8px;
    background:var(--acc-soft);color:var(--acc-d);border:1px solid var(--acc-line);
    font-size:12px;font-weight:800;padding:7px 13px;border-radius:999px;letter-spacing:.2px;
  }
  .phase-pill .dot{width:7px;height:7px;border-radius:50%;background:var(--acc);box-shadow:0 0 0 3px var(--acc-soft)}
  .mini-stats{display:flex;gap:22px}
  .mini b{font-family:'Manrope',sans-serif;display:block;font-size:25px;font-weight:800;letter-spacing:-.6px;color:var(--ink);font-variant-numeric:tabular-nums;line-height:1}
  .mini span{font-size:10px;color:var(--txt3);font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-top:5px;display:block}

  /* Card */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r-card);padding:22px;margin-bottom:16px;box-shadow:var(--sh)}
  .card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
  .card-h h2{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--ink)}
  .card-h .count{font-size:12px;color:var(--txt3);font-weight:700;font-variant-numeric:tabular-nums}
  .card.focus{border-color:var(--acc-line);box-shadow:var(--sh-lg)}
  .card.focus .card-h h2{color:var(--acc-d)}

  /* Navegador de dias */
  .daynav{display:flex;align-items:center;gap:9px;margin:-2px 0 16px;padding:7px 8px;border-radius:13px;background:var(--card2);border:1px solid var(--line)}
  .daynav.past{background:#fdf6e8;border-color:#f0e2bd}
  .dnav-btn{width:34px;height:34px;flex-shrink:0;border-radius:10px;border:1px solid var(--line);background:#fff;color:var(--txt2);font-size:19px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;transition:.15s;font-family:inherit}
  .dnav-btn:hover:not(:disabled){color:var(--acc-d);border-color:var(--acc-line)}
  .dnav-btn:disabled{opacity:.32;cursor:default}
  .dnav-lbl{flex:1;text-align:center;font-size:12.5px;font-weight:700;color:var(--txt2);letter-spacing:-.1px}
  .daynav.past .dnav-lbl{color:#9a6f15}
  .dnav-today{flex-shrink:0;padding:0 13px;height:34px;border-radius:10px;border:1px solid var(--acc-line);background:var(--acc-soft);color:var(--acc-d);font-size:12px;font-weight:800;cursor:pointer;font-family:inherit}
  .cell:not(.future){cursor:pointer}
  .cell.sel{outline:2px solid var(--acc);outline-offset:1px}

  .meal{margin-bottom:18px}
  .meal:last-child{margin-bottom:0}
  .meal-h{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .meal-ic{width:24px;height:24px;display:flex;align-items:center;justify-content:center;color:var(--acc-d);background:var(--acc-soft);border-radius:8px}
  .meal-ic svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .meal-name{font-size:11px;font-weight:800;color:var(--txt2);text-transform:uppercase;letter-spacing:.8px}

  .item{
    display:flex;align-items:center;gap:14px;padding:15px 16px;
    background:var(--card2);border:1px solid var(--line);border-radius:var(--r-item);
    cursor:pointer;transition:transform .15s ease,border-color .2s,background .2s,box-shadow .2s;margin-bottom:10px;user-select:none;
  }
  .item:last-child{margin-bottom:0}
  .item:active{transform:scale(.99)}
  .item:hover{border-color:var(--acc-line);box-shadow:var(--sh-sm)}
  .item.on{background:var(--acc-soft);border-color:var(--acc-line)}
  .check{width:28px;height:28px;border-radius:9px;flex-shrink:0;position:relative;border:2px solid #cdd8e6;background:#fff;transition:.2s}
  .check svg{position:absolute;inset:0;margin:auto;width:16px;height:16px;stroke:#fff;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:20;stroke-dashoffset:20;transition:stroke-dashoffset .25s ease .05s}
  .item.on .check{background:linear-gradient(145deg,var(--acc),var(--acc-d));border-color:var(--acc);box-shadow:0 6px 14px -5px rgba(15,165,137,.6)}
  .item.on .check svg{stroke-dashoffset:0}
  .item .info{flex:1;min-width:0}
  .item .name{font-size:15px;font-weight:600;letter-spacing:-.1px;color:var(--ink)}
  .item.on .name{color:var(--acc-d)}
  .item .dose{font-size:12.5px;color:var(--txt3);margin-top:3px}
  .pill-dose{font-size:10.5px;font-weight:800;color:var(--acc-d);background:var(--acc-soft);padding:5px 10px;border-radius:8px;flex-shrink:0;white-space:nowrap;border:1px solid var(--acc-line);letter-spacing:.2px}

  .done-banner{
    display:none;align-items:center;justify-content:center;gap:9px;margin-top:6px;padding:14px;border-radius:14px;
    background:linear-gradient(145deg,var(--acc-soft),#dff3ee);border:1px solid var(--acc-line);color:var(--acc-d);font-weight:800;font-size:14px
  }
  .done-banner svg{width:18px;height:18px;stroke:currentColor;stroke-width:2.6;fill:none;stroke-linecap:round;stroke-linejoin:round}

  .btns{display:flex;gap:12px;margin:0 0 16px}
  .btn{flex:1;padding:16px;border:none;border-radius:15px;font-weight:800;font-size:14.5px;cursor:pointer;transition:.18s;font-family:inherit;letter-spacing:.2px;display:flex;align-items:center;justify-content:center;gap:9px}
  .btn svg{width:18px;height:18px;stroke:currentColor;stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .btn-p{background:linear-gradient(145deg,var(--acc),var(--acc-d));color:#fff;box-shadow:0 12px 26px -12px rgba(15,165,137,.75)}
  .btn-p:hover{filter:brightness(1.05);transform:translateY(-1px)}
  .btn-p:active{transform:translateY(0)}
  .btn-s{background:#fff;color:var(--txt2);border:1px solid var(--line);flex:0 0 auto;padding:16px 18px}
  .btn-s:hover{color:var(--acc-d);border-color:var(--acc-line)}

  .note{display:flex;gap:13px;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:16px;box-shadow:var(--sh-sm)}
  .note-ic{flex-shrink:0;width:22px;height:22px;color:var(--acc-d)}
  .note-ic svg{width:22px;height:22px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .note p{font-size:13px;line-height:1.62;color:var(--txt2)}

  /* Timeline */
  .tl{position:relative}
  .tl-item{position:relative;padding:0 0 20px 28px}
  .tl-item:last-child{padding-bottom:0}
  .tl-item::before{content:"";position:absolute;left:6px;top:18px;bottom:-4px;width:2px;background:var(--line)}
  .tl-item:last-child::before{display:none}
  .tl-dot{position:absolute;left:0;top:3px;width:14px;height:14px;border-radius:50%;background:#fff;border:2px solid #cdd8e6;z-index:1}
  .tl-item.active .tl-dot{background:var(--acc);border-color:var(--acc);box-shadow:0 0 0 4px var(--acc-soft)}
  .tl-item.done .tl-dot{background:#cdd8e6;border-color:#cdd8e6}
  .tl-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:7px}
  .tl-name{font-size:14px;font-weight:700;letter-spacing:-.1px;color:var(--ink)}
  .tl-item.active .tl-name{color:var(--acc-d)}
  .tl-item.done .tl-name{color:var(--txt2)}
  .tl-when{font-size:11px;color:var(--txt3);font-weight:700;white-space:nowrap}
  .tl-list{list-style:none}
  .tl-list li{font-size:12.5px;color:var(--txt2);line-height:1.7;padding-left:15px;position:relative}
  .tl-list li::before{content:"";position:absolute;left:0;top:9px;width:5px;height:5px;border-radius:50%;background:var(--acc-line)}

  /* Heatmap */
  .heat-stats{display:flex;gap:24px;margin-bottom:18px}
  .heat-stat b{font-family:'Manrope',sans-serif;display:block;font-size:24px;font-weight:800;letter-spacing:-.6px;color:var(--ink);font-variant-numeric:tabular-nums}
  .heat-stat:first-child b{color:var(--acc-d)}
  .heat-stat span{font-size:10px;color:var(--txt3);font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-top:4px;display:block}
  .heat-scroll{overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch}
  .heat-grid{display:grid;grid-auto-flow:column;grid-template-rows:auto repeat(7,1fr);gap:5px;width:max-content}
  .heat-wk{font-size:9px;font-weight:800;color:var(--txt3);text-align:center;letter-spacing:.2px}
  .cell{width:18px;height:18px;border-radius:5px;background:#eef2f7;border:1px solid #e4ebf3;position:relative}
  .cell.none{background:#fdeaea;border-color:#f7d2d2}
  .cell.partial{background:#fdf0d2;border-color:#f3dfa6}
  .cell.full{background:var(--acc);border-color:var(--acc-d);box-shadow:0 2px 6px -2px rgba(15,165,137,.5)}
  .cell.today{box-shadow:0 0 0 2px var(--ink)}
  .cell.future{background:#f1f5fa;border-color:#e8eef5}
  .heat-legend{display:flex;flex-wrap:wrap;gap:15px;margin-top:16px}
  .leg{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--txt2);font-weight:600}
  .leg i{width:13px;height:13px;border-radius:4px;display:inline-block;border:1px solid rgba(0,0,0,.05)}
  .leg .l-full{background:var(--acc)} .leg .l-partial{background:#fdf0d2;border-color:#f3dfa6}
  .leg .l-none{background:#fdeaea;border-color:#f7d2d2} .leg .l-future{background:#f1f5fa;border-color:#e8eef5}

  footer{text-align:center;color:#9aa7b8;font-size:11px;font-weight:600;margin-top:24px;letter-spacing:.3px}
  footer .ver{display:block;margin-top:4px;color:#b6c1d0;font-size:10px}
  footer #syncTag{display:block;margin-top:3px;color:var(--acc-d);font-size:10px;font-weight:700}
</style>
</head>
<body>
<div class="wrap">

  <div class="top">
    <div class="brand">
      <div class="logo">
        <svg viewBox="0 0 24 24"><path d="M3 12h3l2 5 4-10 2 5h7"/></svg>
      </div>
      <div>
        <h1>Protocolo de Suplementación</h1>
        <p>Zentum · Longevity 01</p>
      </div>
    </div>
    <div class="date-chip" id="fecha"></div>
  </div>

  <div class="hero">
    <div class="hero-grid">
      <div class="ring-wrap">
        <svg width="132" height="132" viewBox="0 0 124 124">
          <defs>
            <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#27c4a7"/>
              <stop offset="100%" stop-color="#0b8a72"/>
            </linearGradient>
          </defs>
          <circle class="ring-bg" cx="62" cy="62" r="54" fill="none" stroke-width="11"/>
          <circle class="ring-fg" id="ring" cx="62" cy="62" r="54" fill="none" stroke-width="11"
                  stroke-dasharray="339.29" stroke-dashoffset="339.29"/>
        </svg>
        <div class="ring-center">
          <div class="ring-pct" id="ringPct">0%</div>
          <div class="ring-lbl">Hoy</div>
        </div>
      </div>
      <div class="hero-meta">
        <span class="phase-pill"><span class="dot"></span><span id="faseTag">Fase 1</span></span>
        <div class="mini-stats">
          <div class="mini"><b id="dia">1</b><span>Día</span></div>
          <div class="mini"><b id="semana">1</b><span>Semana</span></div>
          <div class="mini"><b id="racha">0</b><span>Cumplidos</span></div>
        </div>
      </div>
    </div>
  </div>

  <div class="card focus">
    <div class="card-h">
      <h2>Lo importante ahora</h2>
      <span class="count" id="contador">0 de 0</span>
    </div>
    <div class="daynav" id="dayNav"></div>
    <div id="hoyItems"></div>
    <div class="done-banner" id="doneMsg">
      <svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
      Completaste todas las tomas de hoy
    </div>
  </div>

  <div class="btns">
    <button class="btn btn-p" onclick="completarDia()">
      <svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
      Marcar día completo
    </button>
    <button class="btn btn-s" onclick="reiniciar()" title="Reiniciar">
      <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
    </button>
  </div>

  <div class="note">
    <div class="note-ic">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
    </div>
    <p id="notaFase"></p>
  </div>

  <div class="card">
    <div class="card-h"><h2>Plan completo</h2></div>
    <div class="tl" id="tlFases"></div>
  </div>

  <div class="card">
    <div class="card-h"><h2>Consistencia</h2><span class="count" id="totalDias"></span></div>
    <div class="heat-stats">
      <div class="heat-stat"><b id="hsAdh">0%</b><span>Adherencia</span></div>
      <div class="heat-stat"><b id="hsRacha">0</b><span>Racha actual</span></div>
      <div class="heat-stat"><b id="hsFull">0</b><span>Días completos</span></div>
    </div>
    <div class="heat-scroll"><div class="heat-grid" id="heatGrid"></div></div>
    <div class="heat-legend">
      <span class="leg"><i class="l-full"></i>Todo</span>
      <span class="leg"><i class="l-partial"></i>Parcial</span>
      <span class="leg"><i class="l-none"></i>Nada</span>
      <span class="leg"><i class="l-future"></i>Próximo</span>
    </div>
  </div>

  <footer>Elaborado por Vinz Lucchesi<span class="ver" id="ver"></span><span class="ver" id="syncTag"></span></footer>
</div>

<script>
// Dia 1 fijo del programa (igual que el recordatorio de Slack)
const INICIO = '2026-06-17';
const HOY = new Date().toLocaleDateString('en-CA', { timeZone: 'America/Lima' });
const diaPrograma = Math.floor((Date.parse(HOY + 'T00:00:00Z') - Date.parse(INICIO + 'T00:00:00Z')) / 86400000) + 1;
const semana = Math.ceil(diaPrograma / 7);

// Dia seleccionado en la card "Lo importante ahora" (hoy por defecto; navegable a dias pasados)
function dsDiaG(d){ return new Date(Date.parse(INICIO+'T00:00:00Z')+(d-1)*86400000).toISOString().split('T')[0]; }
let selDia = diaPrograma;
let selDate = HOY;
function goDay(delta){ selDia = Math.min(diaPrograma, Math.max(1, selDia+delta)); selDate = dsDiaG(selDia); render(); }
function volverHoy(){ selDia = diaPrograma; selDate = HOY; render(); }
function jumpDay(d){ selDia = Math.min(diaPrograma, Math.max(1, d)); selDate = dsDiaG(selDia); render(); window.scrollTo({top:0, behavior:'smooth'}); }
function renderDayNav(){
  const nav = document.getElementById('dayNav'); if(!nav) return;
  const esHoy = selDate === HOY;
  const d = new Date(Date.parse(selDate+'T00:00:00Z'));
  const label = esHoy ? 'Hoy' : ('Día '+selDia+' · '+d.toLocaleDateString('es-PE',{weekday:'long',day:'numeric',month:'long',timeZone:'UTC'}));
  nav.className = 'daynav'+(esHoy?'':' past');
  nav.innerHTML =
    `<button class="dnav-btn" ${selDia<=1?'disabled':''} onclick="goDay(-1)" aria-label="Día anterior">‹</button>`+
    `<span class="dnav-lbl">${label}</span>`+
    `<button class="dnav-btn" ${esHoy?'disabled':''} onclick="goDay(1)" aria-label="Día siguiente">›</button>`+
    (esHoy ? '' : `<button class="dnav-today" onclick="volverHoy()">Hoy</button>`);
}

const IC_SUN = '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>';
const IC_MOON = '<svg viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>';
const mealIcon = m => m==='Almuerzo' ? IC_SUN : IC_MOON;

function tomasDeHoy(dia){
  if(dia <= 5) return {fase:'Fase 1', items:[
    {meal:'Almuerzo', name:'Complejo de vitaminas', dose:'1 capsula', tag:'D3 + B9 + B12', id:'c'},
    {meal:'Almuerzo', name:'Berberina', dose:'1 capsula', tag:'500 mg', id:'b1'},
    {meal:'Almuerzo', name:'Omega 3', dose:'2 softgels', tag:'EPA + DHA', id:'o1'},
    {meal:'Cena', name:'Omega 3', dose:'2 softgels', tag:'EPA + DHA', id:'o2'},
  ]};
  if(dia <= 56) return {fase:'Fase 2', items:[
    {meal:'Almuerzo', name:'Complejo de vitaminas', dose:'1 capsula', tag:'D3 + B9 + B12', id:'c'},

    {meal:'Cena', name:'Omega 3', dose:'2 softgels', tag:'EPA + DHA', id:'o2'},
  ]};
  if(dia <= 84) return {fase:'Fase 3', items:[
    {meal:'Almuerzo', name:'Complejo de vitaminas', dose:'1 capsula', tag:'D3 + B9 + B12', id:'c'},
  ]};
  return {fase:'Fase 4', items:[
    {meal:'Almuerzo', name:'Complejo de vitaminas', dose:'1 capsula', tag:'hasta ajustar', id:'c'},
  ]};
}

};

const RING_CIRC = 339.29;

// ---------- Sincronizacion entre dispositivos (Supabase) ----------
// Se llenan al crear el proyecto. Si quedan vacios, el tablero funciona
// igual en modo local (solo este dispositivo). El merge usa la ultima
// escritura por toma, asi nunca se pierde una marca entre celular y laptop.
const SUPABASE_URL = 'https://ypjyybbtwfwfdlbgikbu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlwanl5YmJ0d2Z3ZmRsYmdpa2J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3Mjk2NzAsImV4cCI6MjA5NzMwNTY3MH0.bLuAVTavc_KZvNGNEaJjucd5PRzWcjOvIKSSTFWhfRk';
const SYNC_ID = 'vinz';    // fila unica del usuario
const cloudOn = () => !!(SUPABASE_URL && SUPABASE_KEY);

const DKEY = /^\d{4}-\d{2}-\d{2}:/;
const metaLoad = () => { try { return JSON.parse(localStorage.getItem('__sync_meta')||'{}'); } catch(e){ return {}; } };
const metaSave = m => localStorage.setItem('__sync_meta', JSON.stringify(m));

// Marca/desmarca una toma + sella la hora + agenda sync
function setMark(key, val){
  localStorage.setItem(key, val);
  const m = metaLoad(); m[key] = Date.now(); metaSave(m);
  schedulePush();
}

// Estado local como { key: {v:'1'|'0', t:epoch} }
function localState(){
  const m = metaLoad(); const out = {};
  new Set([...Object.keys(localStorage).filter(k=>DKEY.test(k)), ...Object.keys(m)]).forEach(k=>{
    out[k] = { v: localStorage.getItem(k)==='1' ? '1':'0', t: m[k]||1 };
  });
  return out;
}
// Merge por ultima escritura (mayor t gana)
function mergeStates(a, b){
  const out = {};
  new Set([...Object.keys(a), ...Object.keys(b)]).forEach(k=>{
    const x=a[k], y=b[k];
    out[k] = (!y || (x && x.t>=y.t)) ? x : y;
  });
  return out;
}
function applyState(s){
  const m = metaLoad();
  Object.entries(s).forEach(([k,info])=>{
    if(info.v==='1') localStorage.setItem(k,'1'); else localStorage.removeItem(k);
    m[k] = info.t;
  });
  metaSave(m);
}

async function cloudPull(){
  const r = await fetch(`${SUPABASE_URL}/rest/v1/estado?id=eq.${SYNC_ID}&select=data`, {
    headers:{ apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}` }
  });
  if(!r.ok) throw new Error('pull '+r.status);
  const rows = await r.json();
  return (rows[0] && rows[0].data) || {};
}
async function cloudPush(state){
  const r = await fetch(`${SUPABASE_URL}/rest/v1/estado`, {
    method:'POST',
    headers:{ apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}`,
      'Content-Type':'application/json', Prefer:'resolution=merge-duplicates,return=minimal' },
    body: JSON.stringify([{ id:SYNC_ID, data:state, updated_at:new Date().toISOString() }])
  });
  if(!r.ok) throw new Error('push '+r.status);
}

let pushTimer=null, syncing=false;
function schedulePush(){
  if(!cloudOn()){ setStatus('local'); return; }
  clearTimeout(pushTimer);
  pushTimer = setTimeout(fullSync, 1200);
}
async function fullSync(){
  if(!cloudOn()){ setStatus('local'); return; }
  if(syncing) return;
  syncing=true; setStatus('sync');
  try{
    const remote = await cloudPull();
    const merged = mergeStates(localState(), remote);
    applyState(merged);
    await cloudPush(merged);
    setStatus('ok'); render();
  }catch(e){ setStatus('err'); }
  finally{ syncing=false; }
}
function setStatus(s){
  const el=document.getElementById('syncTag'); if(!el) return;
  el.textContent = { local:'Solo este dispositivo', sync:'Sincronizando…',
    ok:'Sincronizado entre tus dispositivos', err:'Sin conexion · guardado local' }[s] || '';
}

function render(){
  document.getElementById('fecha').textContent = new Date().toLocaleDateString('es-PE',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('dia').textContent = diaPrograma;
  document.getElementById('semana').textContent = semana;

  // Hero = SIEMPRE hoy
  const planHoy = tomasDeHoy(diaPrograma);
  document.getElementById('faseTag').textContent = planHoy.fase;
  document.getElementById('notaFase').textContent = notas[planHoy.fase];
  const totHoy = planHoy.items.length;
  const hechosHoy = planHoy.items.filter(it=>localStorage.getItem(`${HOY}:${it.meal}:${it.id}`)==='1').length;
  const pctHoy = totHoy ? Math.round(hechosHoy/totHoy*100) : 0;
  document.getElementById('ringPct').textContent = pctHoy+'%';
  document.getElementById('ring').style.strokeDashoffset = RING_CIRC*(1-pctHoy/100);

  // Card "Lo importante ahora" = dia seleccionado (hoy por defecto, navegable a dias pasados)
  renderDayNav();
  const plan = tomasDeHoy(selDia);
  const cont = document.getElementById('hoyItems');
  cont.innerHTML = '';
  const comidas = [...new Set(plan.items.map(i=>i.meal))];
  comidas.forEach(c=>{
    const wrap = document.createElement('div'); wrap.className='meal';
    wrap.innerHTML = `<div class="meal-h"><span class="meal-ic">${mealIcon(c)}</span><span class="meal-name">${c}</span></div>`;
    plan.items.filter(i=>i.meal===c).forEach(it=>{
      const key = `${selDate}:${it.meal}:${it.id}`;
      const on = localStorage.getItem(key)==='1';
      const el = document.createElement('div');
      el.className = 'item'+(on?' on':'');
      el.onclick = ()=>{ setMark(key, on?'0':'1'); render(); };
      el.innerHTML =
        `<div class="check"><svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg></div>`+
        `<div class="info"><div class="name">${it.name}</div><div class="dose">${it.dose}</div></div>`+
        `<div class="pill-dose">${it.tag}</div>`;
      wrap.appendChild(el);
    });
    cont.appendChild(wrap);
  });

  const total = plan.items.length;
  const hechos = plan.items.filter(it=>localStorage.getItem(`${selDate}:${it.meal}:${it.id}`)==='1').length;
  document.getElementById('contador').textContent = `${hechos} de ${total}`;
  document.getElementById('doneMsg').style.display = (hechos===total && total>0) ? 'flex':'none';

  const tl = document.getElementById('tlFases'); tl.innerHTML='';
  refFases.forEach(f=>{
    const active = diaPrograma>=f.rango[0] && diaPrograma<=f.rango[1];
    const done = diaPrograma > f.rango[1];
    const d = document.createElement('div');
    d.className = 'tl-item'+(active?' active':'')+(done?' done':'');
    d.innerHTML = `<div class="tl-dot"></div>`+
      `<div class="tl-head"><span class="tl-name">${f.nombre}</span><span class="tl-when">${f.when}</span></div>`+
      `<ul class="tl-list">${f.lo.map(x=>`<li>${x}</li>`).join('')}</ul>`;
    tl.appendChild(d);
  });

  // ----- Consistencia (heatmap) -----
  const PROG_DIAS = 84; // 12 semanas
  function dsDia(d){ return new Date(Date.parse(INICIO+'T00:00:00Z')+(d-1)*86400000).toISOString().split('T')[0]; }
  function estadoDia(d){
    const items = tomasDeHoy(d).items;
    const exp = items.length;
    const tk = items.filter(it=>localStorage.getItem(`${dsDia(d)}:${it.meal}:${it.id}`)==='1').length;
    return {exp, tk, full: exp>0 && tk===exp, partial: tk>0 && tk<exp};
  }

  let fullCount=0;
  for(let d=1; d<=diaPrograma && d<=PROG_DIAS; d++){ if(estadoDia(d).full) fullCount++; }
  const dueSoFar = Math.max(0, Math.min(diaPrograma, PROG_DIAS));
  const adh = dueSoFar>0 ? Math.round(fullCount/dueSoFar*100) : 0;
  let streak=0;
  let start = (diaPrograma>=1 && estadoDia(diaPrograma).full) ? diaPrograma : diaPrograma-1;
  for(let d=start; d>=1 && estadoDia(d).full; d--) streak++;

  document.getElementById('racha').textContent = fullCount;
  document.getElementById('hsFull').textContent = fullCount;
  document.getElementById('hsAdh').textContent = adh+'%';
  document.getElementById('hsRacha').textContent = streak;
  document.getElementById('totalDias').textContent = `${dueSoFar} de ${PROG_DIAS} días`;

  const semanas = Math.ceil(PROG_DIAS/7);
  let html='';
  for(let w=1; w<=semanas; w++){
    html += `<div class="heat-wk">S${w}</div>`;
    for(let pos=0; pos<7; pos++){
      const d=(w-1)*7+pos+1;
      if(d>PROG_DIAS){ html+='<div></div>'; continue; }
      const ds=dsDia(d); const ddmm=ds.slice(8)+'/'+ds.slice(5,7);
      if(d>diaPrograma){ html+=`<div class="cell future" title="Día ${d} · ${ddmm} · próximo"></div>`; continue; }
      const s=estadoDia(d);
      const cls = s.full?'full':(s.partial?'partial':'none');
      const today = d===diaPrograma?' today':'';
      html+=`<div class="cell ${cls}${today}${d===selDia?' sel':''}" title="Día ${d} · ${ddmm} · ${s.tk} de ${s.exp} tomas" onclick="jumpDay(${d})"></div>`;
    }
  }
  document.getElementById('heatGrid').innerHTML = html;
}

function reiniciar(){
  if(confirm('Esto borra tu progreso en TODOS tus dispositivos. Seguro?')){
    const m = metaLoad(); const now = Date.now();
    Object.keys(localStorage).filter(k=>DKEY.test(k)).forEach(k=>{ localStorage.removeItem(k); m[k]=now; });
    metaSave(m);
    if(cloudOn()) fullSync().finally(()=>location.reload());
    else location.reload();
  }
}
