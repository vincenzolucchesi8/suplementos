<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Protocolo de Suplementacion · Zentum</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#eef3f9;
    --bg2:#e4ebf4;
    --card:#ffffff;
    --navy:#143b6b;
    --navy-d:#0e2c50;
    --navy-soft:#eaf1fa;
    --navy-line:#d6e2f1;
    --ink:#15293f;
    --txt2:#56657a;
    --txt3:#8a98ab;
    --line:#e7edf4;
    --teal:#13a884;
    --teal-d:#0c8e6f;
    --teal-soft:#e6f6f1;
    --teal-line:#bfe8dd;
    --amber:#c98a16;
    --amber-bg:#fdf5e6;
    --amber-line:#f1e0bb;
    --shadow:0 10px 30px -14px rgba(20,59,107,.22);
    --shadow-lg:0 18px 44px -20px rgba(20,59,107,.30);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg)}
  body{
    font-family:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
    color:var(--ink);min-height:100vh;line-height:1.5;
    padding:26px 16px 46px;
    background:
      radial-gradient(820px 420px at 50% -8%, #f3f8ff, transparent 60%),
      linear-gradient(180deg,var(--bg),var(--bg2));
  }
  .wrap{max-width:580px;margin:0 auto}

  /* Header */
  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
  .brand{display:flex;align-items:center;gap:13px}
  .logo{
    width:44px;height:44px;border-radius:13px;flex-shrink:0;
    background:linear-gradient(150deg,var(--navy),var(--navy-d));
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 20px -8px rgba(20,59,107,.55), inset 0 1px 0 rgba(255,255,255,.18);
  }
  .logo svg{width:23px;height:23px;stroke:#fff;stroke-width:2.3;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .brand h1{font-family:'Manrope',sans-serif;font-size:16.5px;font-weight:800;letter-spacing:-.2px;color:var(--navy)}
  .brand p{font-size:11.5px;color:var(--txt3);font-weight:600;margin-top:1px;letter-spacing:.3px;text-transform:uppercase}
  .date-chip{font-size:12px;color:var(--txt2);font-weight:600;text-align:right;text-transform:capitalize;max-width:118px;line-height:1.35}

  /* Hero */
  .hero{
    background:var(--card);border:1px solid var(--line);border-radius:22px;
    padding:24px;box-shadow:var(--shadow-lg);margin-bottom:15px;
  }
  .hero-grid{display:flex;align-items:center;gap:24px}
  .ring-wrap{position:relative;width:124px;height:124px;flex-shrink:0}
  .ring-wrap svg{transform:rotate(-90deg)}
  .ring-bg{stroke:#e9eff7}
  .ring-fg{stroke:url(#grad);stroke-linecap:round;transition:stroke-dashoffset .7s cubic-bezier(.4,0,.2,1)}
  .ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring-pct{font-family:'Manrope',sans-serif;font-size:30px;font-weight:800;letter-spacing:-1px;line-height:1;color:var(--navy);font-variant-numeric:tabular-nums}
  .ring-lbl{font-size:10px;color:var(--txt3);font-weight:700;text-transform:uppercase;letter-spacing:.9px;margin-top:5px}
  .hero-meta{flex:1;display:flex;flex-direction:column;gap:14px}
  .phase-pill{
    align-self:flex-start;display:inline-flex;align-items:center;gap:7px;
    background:var(--navy-soft);color:var(--navy);border:1px solid var(--navy-line);
    font-size:12px;font-weight:700;padding:6px 12px;border-radius:999px;
  }
  .phase-pill .dot{width:6px;height:6px;border-radius:50%;background:var(--teal)}
  .mini-stats{display:flex;gap:20px}
  .mini b{font-family:'Manrope',sans-serif;display:block;font-size:23px;font-weight:800;letter-spacing:-.5px;color:var(--ink);font-variant-numeric:tabular-nums}
  .mini span{font-size:10.5px;color:var(--txt3);font-weight:700;text-transform:uppercase;letter-spacing:.4px}

  /* Card */
  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:20px;margin-bottom:15px;box-shadow:var(--shadow)}
  .card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .card-h h2{font-size:12.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--navy)}
  .card-h .count{font-size:12px;color:var(--txt3);font-weight:600;font-variant-numeric:tabular-nums}

  .meal{margin-bottom:18px}
  .meal:last-child{margin-bottom:0}
  .meal-h{display:flex;align-items:center;gap:9px;margin-bottom:11px}
  .meal-ic{width:22px;height:22px;display:flex;align-items:center;justify-content:center;color:var(--txt3)}
  .meal-ic svg{width:16px;height:16px;stroke:currentColor;stroke-width:1.9;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .meal-name{font-size:11.5px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.6px}

  .item{
    display:flex;align-items:center;gap:13px;padding:13px 14px;
    background:#fbfcfe;border:1px solid var(--line);border-radius:13px;
    cursor:pointer;transition:transform .15s ease,border-color .2s,background .2s;margin-bottom:9px;user-select:none;
  }
  .item:last-child{margin-bottom:0}
  .item:active{transform:scale(.985)}
  .item:hover{border-color:var(--navy-line)}
  .item.on{background:var(--teal-soft);border-color:var(--teal-line)}
  .check{width:26px;height:26px;border-radius:8px;flex-shrink:0;position:relative;border:2px solid #c7d3e2;background:#fff;transition:.2s}
  .check svg{position:absolute;inset:0;margin:auto;width:15px;height:15px;stroke:#fff;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:20;stroke-dashoffset:20;transition:stroke-dashoffset .25s ease .05s}
  .item.on .check{background:linear-gradient(145deg,var(--teal),var(--teal-d));border-color:var(--teal)}
  .item.on .check svg{stroke-dashoffset:0}
  .item .info{flex:1;min-width:0}
  .item .name{font-size:14.5px;font-weight:600;letter-spacing:-.1px;color:var(--ink)}
  .item .dose{font-size:12.5px;color:var(--txt3);margin-top:2px}
  .pill-dose{font-size:10.5px;font-weight:700;color:var(--navy);background:var(--navy-soft);padding:4px 9px;border-radius:7px;flex-shrink:0;white-space:nowrap;border:1px solid var(--navy-line)}

  .done-banner{
    display:none;align-items:center;justify-content:center;gap:8px;margin-top:4px;padding:12px;border-radius:12px;
    background:var(--teal-soft);border:1px solid var(--teal-line);color:var(--teal-d);font-weight:700;font-size:13.5px
  }
  .done-banner svg{width:17px;height:17px;stroke:currentColor;stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round}

  .btns{display:flex;gap:11px;margin:2px 0 16px}
  .btn{flex:1;padding:15px;border:none;border-radius:13px;font-weight:700;font-size:14px;cursor:pointer;transition:.18s;font-family:inherit;letter-spacing:.2px;display:flex;align-items:center;justify-content:center;gap:8px}
  .btn svg{width:17px;height:17px;stroke:currentColor;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .btn-p{background:linear-gradient(145deg,var(--navy),var(--navy-d));color:#fff;box-shadow:0 10px 24px -12px rgba(20,59,107,.7)}
  .btn-p:hover{filter:brightness(1.08);transform:translateY(-1px)}
  .btn-p:active{transform:translateY(0)}
  .btn-s{background:#fff;color:var(--txt2);border:1px solid var(--navy-line);flex:0 0 auto;padding:15px 18px}
  .btn-s:hover{color:var(--navy);border-color:var(--navy)}

  .note{display:flex;gap:12px;background:var(--amber-bg);border:1px solid var(--amber-line);border-radius:15px;padding:14px;margin-bottom:15px}
  .note-ic{flex-shrink:0;width:20px;height:20px;color:var(--amber)}
  .note-ic svg{width:20px;height:20px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .note p{font-size:13px;line-height:1.6;color:#8a6516}

  .tl{position:relative}
  .tl-item{position:relative;padding:0 0 18px 28px}
  .tl-item:last-child{padding-bottom:0}
  .tl-item::before{content:"";position:absolute;left:6px;top:18px;bottom:-4px;width:2px;background:var(--line)}
  .tl-item:last-child::before{display:none}
  .tl-dot{position:absolute;left:0;top:3px;width:14px;height:14px;border-radius:50%;background:#fff;border:2px solid #c7d3e2;z-index:1}
  .tl-item.active .tl-dot{background:var(--teal);border-color:var(--teal);box-shadow:0 0 0 4px var(--teal-soft)}
  .tl-item.done .tl-dot{background:var(--navy-line);border-color:var(--navy-line)}
  .tl-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:6px}
  .tl-name{font-size:14px;font-weight:700;letter-spacing:-.1px;color:var(--ink)}
  .tl-item.active .tl-name{color:var(--teal-d)}
  .tl-when{font-size:11px;color:var(--txt3);font-weight:600;white-space:nowrap}
  .tl-list{list-style:none}
  .tl-list li{font-size:12.5px;color:var(--txt2);line-height:1.65;padding-left:14px;position:relative}
  .tl-list li::before{content:"";position:absolute;left:0;top:9px;width:4px;height:4px;border-radius:50%;background:var(--navy-line)}

  .badges{display:flex;flex-wrap:wrap;gap:7px}
  .badge{font-size:11px;font-weight:700;font-variant-numeric:tabular-nums;background:#f6f9fc;color:var(--txt3);border:1px solid var(--line);padding:6px 11px;border-radius:8px}
  .badge.on{background:var(--teal-soft);color:var(--teal-d);border-color:var(--teal-line)}
  .empty{font-size:12.5px;color:var(--txt3)}

  /* Heatmap de consistencia */
  .heat-stats{display:flex;gap:22px;margin-bottom:16px}
  .heat-stat b{font-family:'Manrope',sans-serif;display:block;font-size:22px;font-weight:800;letter-spacing:-.5px;color:var(--navy);font-variant-numeric:tabular-nums}
  .heat-stat span{font-size:10.5px;color:var(--txt3);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
  .heat-scroll{overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch}
  .heat-grid{display:grid;grid-auto-flow:column;grid-template-rows:auto repeat(7,1fr);gap:5px;width:max-content}
  .heat-wk{font-size:9px;font-weight:700;color:var(--txt3);text-align:center;letter-spacing:.2px}
  .cell{width:17px;height:17px;border-radius:5px;background:#eef2f7;border:1px solid #e2e9f2;position:relative}
  .cell.none{background:#fde7e7;border-color:#f6cccc}
  .cell.partial{background:#fdeecb;border-color:#f3dca0}
  .cell.full{background:var(--teal);border-color:var(--teal-d)}
  .cell.today{box-shadow:0 0 0 2px var(--navy)}
  .cell.future{background:#f3f6fa;border-color:#eaeff5}
  .heat-legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:14px}
  .leg{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--txt2);font-weight:600}
  .leg i{width:13px;height:13px;border-radius:4px;display:inline-block;border:1px solid rgba(0,0,0,.05)}
  .leg .l-full{background:var(--teal)} .leg .l-partial{background:#fdeecb;border-color:#f3dca0}
  .leg .l-none{background:#fde7e7;border-color:#f6cccc} .leg .l-future{background:#f3f6fa;border-color:#eaeff5}

  footer{text-align:center;color:#9aa7b8;font-size:11px;font-weight:500;margin-top:22px;letter-spacing:.3px}
  footer .ver{display:block;margin-top:4px;color:#b8c2d0;font-size:10px}
</style>
</head>
<body>
<div class="wrap">

  <div class="top">
    <div class="brand">
      <div class="logo">
        <svg viewBox="0 0 24 24"><path d="M3 12h3l2 5 4-10 2 5h7"/></svg>
      </div>
      <div>
        <h1>Protocolo de Suplementacion</h1>
        <p>Zentum · Longevity 01</p>
      </div>
    </div>
    <div class="date-chip" id="fecha"></div>
  </div>

  <div class="hero">
    <div class="hero-grid">
      <div class="ring-wrap">
        <svg width="124" height="124" viewBox="0 0 124 124">
          <defs>
            <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#1f6fb2"/>
              <stop offset="100%" stop-color="#13a884"/>
            </linearGradient>
          </defs>
          <circle class="ring-bg" cx="62" cy="62" r="54" fill="none" stroke-width="11"/>
          <circle class="ring-fg" id="ring" cx="62" cy="62" r="54" fill="none" stroke-width="11"
                  stroke-dasharray="339.29" stroke-dashoffset="339.29"/>
        </svg>
        <div class="ring-center">
          <div class="ring-pct" id="ringPct">0%</div>
          <div class="ring-lbl">Hoy</div>
        </div>
      </div>
      <div class="hero-meta">
        <span class="phase-pill"><span class="dot"></span><span id="faseTag">Fase 1</span></span>
        <div class="mini-stats">
          <div class="mini"><b id="dia">1</b><span>Dia</span></div>
          <div class="mini"><b id="semana">1</b><span>Semana</span></div>
          <div class="mini"><b id="racha">0</b><span>Cumplidos</span></div>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-h">
      <h2>Tomas de hoy</h2>
      <span class="count" id="contador">0 de 0</span>
    </div>
    <div id="hoyItems"></div>
    <div class="done-banner" id="doneMsg">
      <svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
      Completaste todas las tomas de hoy
    </div>
  </div>

  <div class="btns">
    <button class="btn btn-p" onclick="completarDia()">
      <svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
      Marcar dia completo
    </button>
    <button class="btn btn-s" onclick="reiniciar()" title="Reiniciar">
      <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
    </button>
  </div>

  <div class="note">
    <div class="note-ic">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
    </div>
    <p id="notaFase"></p>
  </div>

  <div class="card">
    <div class="card-h"><h2>Plan completo</h2></div>
    <div class="tl" id="tlFases"></div>
  </div>

  <div class="card">
    <div class="card-h"><h2>Consistencia</h2><span class="count" id="totalDias"></span></div>
    <div class="heat-stats">
      <div class="heat-stat"><b id="hsAdh">0%</b><span>Adherencia</span></div>
      <div class="heat-stat"><b id="hsRacha">0</b><span>Racha actual</span></div>
      <div class="heat-stat"><b id="hsFull">0</b><span>Días completos</span></div>
    </div>
    <div class="heat-scroll"><div class="heat-grid" id="heatGrid"></div></div>
    <div class="heat-legend">
      <span class="leg"><i class="l-full"></i>Todo</span>
      <span class="leg"><i class="l-partial"></i>Parcial</span>
      <span class="leg"><i class="l-none"></i>Nada</span>
      <span class="leg"><i class="l-future"></i>Próximo</span>
    </div>
  </div>

  <footer>Elaborado por Vinz Lucchesi<span class="ver" id="ver"></span><span class="ver" id="syncTag"></span></footer>
</div>

<script>
// Dia 1 fijo del programa (igual que el recordatorio de Slack)
const INICIO = '2026-06-17';
const HOY = new Date().toLocaleDateString('en-CA', { timeZone: 'America/Lima' });
const diaPrograma = Math.floor((Date.parse(HOY + 'T00:00:00Z') - Date.parse(INICIO + 'T00:00:00Z')) / 86400000) + 1;
const semana = Math.ceil(diaPrograma / 7);

const IC_SUN = '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>';
const IC_MOON = '<svg viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>';
const mealIcon = m => m==='Almuerzo' ? IC_SUN : IC_MOON;

function tomasDeHoy(dia){
  if(dia <= 5) return {fase:'Fase 1', items:[
    {meal:'Almuerzo', name:'Complejo de vitaminas', dose:'1 capsula', tag:'D3 + B9 + B12', id:'c'},
    {meal:'Almuerzo', name:'Berberina', dose:'1 capsula', tag:'500 mg', id:'b1'},
    {meal:'Almuerzo', name:'Omega 3', dose:'2 softgels', tag:'EPA + DHA', id:'o1'},
    {meal:'Cena', name:'Omega 3', dose:'2 softgels', tag:'EPA + DHA', id:'o2'},
  ]};
  if(dia <= 56) return {fase:'Fase 2', items:[
    {meal:'Almuerzo', name:'Complejo de vitaminas', dose:'1 capsula', tag:'D3 + B9 + B12', id:'c'},
    {meal:'Almuerzo', name:'Berberina', dose:'1 capsula', tag:'500 mg', id:'b1'},
    {meal:'Almuerzo', name:'Omega 3', dose:'2 softgels', tag:'EPA + DHA', id:'o1'},
    {meal:'Cena', name:'Berberina', dose:'1 capsula', tag:'500 mg', id:'b2'},
    {meal:'Cena', name:'Omega 3', dose:'2 softgels', tag:'EPA + DHA', id:'o2'},
  ]};
  if(dia <= 84) return {fase:'Fase 3', items:[
    {meal:'Almuerzo', name:'Complejo de vitaminas', dose:'1 capsula', tag:'D3 + B9 + B12', id:'c'},
  ]};
  return {fase:'Fase 4', items:[
    {meal:'Almuerzo', name:'Complejo de vitaminas', dose:'1 capsula', tag:'hasta ajustar', id:'c'},
  ]};
}

const refFases = [
  {nombre:'Arranque', when:'Dia 1 a 5', rango:[1,5], lo:[
    'Complejo de vitaminas: 1 capsula con almuerzo',
    'Berberina: solo 1 capsula al dia (tolerancia)',
    'Omega 3: 2 softgels almuerzo y 2 en la cena',
  ]},
  {nombre:'Dosis completa', when:'Dia 6 a semana 8', rango:[6,56], lo:[
    'Complejo de vitaminas: 1 capsula con almuerzo',
    'Berberina: 1 almuerzo y 1 cena',
    'Omega 3: 2 softgels almuerzo y 2 en la cena',
  ]},
  {nombre:'Solo vitaminas', when:'Semana 9 a 12', rango:[57,84], lo:[
    'Complejo de vitaminas: 1 capsula con almuerzo',
    'Omega 3 y Berberina ya cumplieron sus 8 semanas',
  ]},
  {nombre:'Control medico', when:'Semana 12', rango:[85,99999], lo:[
    'Repetir analisis (Vit D, B12, homocisteina, trigliceridos, insulina)',
    'Ajustar con medico. La B12 baja a 2 o 3 veces por semana',
  ]},
];

const notas = {
  'Fase 1':'Estas en el arranque. La berberina va suave (solo 1 al dia) para que tu estomago se acostumbre antes de pasar a dos tomas.',
  'Fase 2':'Dosis completa. Toma todo con las comidas principales. El complejo necesita algo de grasa para absorber bien la vitamina D3.',
  'Fase 3':'El Omega 3 y la Berberina ya cumplieron sus 8 semanas. A partir de aqui solo sigue el complejo de vitaminas.',
  'Fase 4':'Toca repetir analisis y ajustar el plan con tu medico antes de continuar.',
};

const RING_CIRC = 339.29;

// ---------- Sincronizacion entre dispositivos (Supabase) ----------
// Se llenan al crear el proyecto. Si quedan vacios, el tablero funciona
// igual en modo local (solo este dispositivo). El merge usa la ultima
// escritura por toma, asi nunca se pierde una marca entre celular y laptop.
const SUPABASE_URL = '';   // ej: https://abcd1234.supabase.co
const SUPABASE_KEY = '';   // anon public key
const SYNC_ID = 'vinz';    // fila unica del usuario
const cloudOn = () => !!(SUPABASE_URL && SUPABASE_KEY);

const DKEY = /^\d{4}-\d{2}-\d{2}:/;
const metaLoad = () => { try { return JSON.parse(localStorage.getItem('__sync_meta')||'{}'); } catch(e){ return {}; } };
const metaSave = m => localStorage.setItem('__sync_meta', JSON.stringify(m));

// Marca/desmarca una toma + sella la hora + agenda sync
function setMark(key, val){
  localStorage.setItem(key, val);
  const m = metaLoad(); m[key] = Date.now(); metaSave(m);
  schedulePush();
}

// Estado local como { key: {v:'1'|'0', t:epoch} }
function localState(){
  const m = metaLoad(); const out = {};
  new Set([...Object.keys(localStorage).filter(k=>DKEY.test(k)), ...Object.keys(m)]).forEach(k=>{
    out[k] = { v: localStorage.getItem(k)==='1' ? '1':'0', t: m[k]||1 };
  });
  return out;
}
// Merge por ultima escritura (mayor t gana)
function mergeStates(a, b){
  const out = {};
  new Set([...Object.keys(a), ...Object.keys(b)]).forEach(k=>{
    const x=a[k], y=b[k];
    out[k] = (!y || (x && x.t>=y.t)) ? x : y;
  });
  return out;
}
function applyState(s){
  const m = metaLoad();
  Object.entries(s).forEach(([k,info])=>{
    if(info.v==='1') localStorage.setItem(k,'1'); else localStorage.removeItem(k);
    m[k] = info.t;
  });
  metaSave(m);
}

async function cloudPull(){
  const r = await fetch(`${SUPABASE_URL}/rest/v1/estado?id=eq.${SYNC_ID}&select=data`, {
    headers:{ apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}` }
  });
  if(!r.ok) throw new Error('pull '+r.status);
  const rows = await r.json();
  return (rows[0] && rows[0].data) || {};
}
async function cloudPush(state){
  const r = await fetch(`${SUPABASE_URL}/rest/v1/estado`, {
    method:'POST',
    headers:{ apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}`,
      'Content-Type':'application/json', Prefer:'resolution=merge-duplicates,return=minimal' },
    body: JSON.stringify([{ id:SYNC_ID, data:state, updated_at:new Date().toISOString() }])
  });
  if(!r.ok) throw new Error('push '+r.status);
}

let pushTimer=null, syncing=false;
function schedulePush(){
  if(!cloudOn()){ setStatus('local'); return; }
  clearTimeout(pushTimer);
  pushTimer = setTimeout(fullSync, 1200);
}
async function fullSync(){
  if(!cloudOn()){ setStatus('local'); return; }
  if(syncing) return;
  syncing=true; setStatus('sync');
  try{
    const remote = await cloudPull();
    const merged = mergeStates(localState(), remote);
    applyState(merged);
    await cloudPush(merged);
    setStatus('ok'); render();
  }catch(e){ setStatus('err'); }
  finally{ syncing=false; }
}
function setStatus(s){
  const el=document.getElementById('syncTag'); if(!el) return;
  el.textContent = { local:'Solo este dispositivo', sync:'Sincronizando…',
    ok:'Sincronizado entre tus dispositivos', err:'Sin conexion · guardado local' }[s] || '';
}

function render(){
  document.getElementById('fecha').textContent = new Date().toLocaleDateString('es-PE',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('dia').textContent = diaPrograma;
  document.getElementById('semana').textContent = semana;

  const plan = tomasDeHoy(diaPrograma);
  document.getElementById('faseTag').textContent = plan.fase;
  document.getElementById('notaFase').textContent = notas[plan.fase];

  const cont = document.getElementById('hoyItems');
  cont.innerHTML = '';
  const comidas = [...new Set(plan.items.map(i=>i.meal))];
  comidas.forEach(c=>{
    const wrap = document.createElement('div'); wrap.className='meal';
    wrap.innerHTML = `<div class="meal-h"><span class="meal-ic">${mealIcon(c)}</span><span class="meal-name">${c}</span></div>`;
    plan.items.filter(i=>i.meal===c).forEach(it=>{
      const key = `${HOY}:${it.meal}:${it.id}`;
      const on = localStorage.getItem(key)==='1';
      const el = document.createElement('div');
      el.className = 'item'+(on?' on':'');
      el.onclick = ()=>{ setMark(key, on?'0':'1'); render(); };
      el.innerHTML =
        `<div class="check"><svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg></div>`+
        `<div class="info"><div class="name">${it.name}</div><div class="dose">${it.dose}</div></div>`+
        `<div class="pill-dose">${it.tag}</div>`;
      wrap.appendChild(el);
    });
    cont.appendChild(wrap);
  });

  const total = plan.items.length;
  const hechos = plan.items.filter(it=>localStorage.getItem(`${HOY}:${it.meal}:${it.id}`)==='1').length;
  const pct = total ? Math.round(hechos/total*100) : 0;
  document.getElementById('contador').textContent = `${hechos} de ${total}`;
  document.getElementById('ringPct').textContent = pct+'%';
  document.getElementById('ring').style.strokeDashoffset = RING_CIRC*(1-pct/100);
  document.getElementById('doneMsg').style.display = (hechos===total && total>0) ? 'flex':'none';

  const tl = document.getElementById('tlFases'); tl.innerHTML='';
  refFases.forEach(f=>{
    const active = diaPrograma>=f.rango[0] && diaPrograma<=f.rango[1];
    const done = diaPrograma > f.rango[1];
    const d = document.createElement('div');
    d.className = 'tl-item'+(active?' active':'')+(done?' done':'');
    d.innerHTML = `<div class="tl-dot"></div>`+
      `<div class="tl-head"><span class="tl-name">${f.nombre}</span><span class="tl-when">${f.when}</span></div>`+
      `<ul class="tl-list">${f.lo.map(x=>`<li>${x}</li>`).join('')}</ul>`;
    tl.appendChild(d);
  });

  // ----- Consistencia (heatmap) -----
  const PROG_DIAS = 84; // 12 semanas
  function dsDia(d){ return new Date(Date.parse(INICIO+'T00:00:00Z')+(d-1)*86400000).toISOString().split('T')[0]; }
  function estadoDia(d){
    const items = tomasDeHoy(d).items;
    const exp = items.length;
    const tk = items.filter(it=>localStorage.getItem(`${dsDia(d)}:${it.meal}:${it.id}`)==='1').length;
    return {exp, tk, full: exp>0 && tk===exp, partial: tk>0 && tk<exp};
  }

  let fullCount=0;
  for(let d=1; d<=diaPrograma && d<=PROG_DIAS; d++){ if(estadoDia(d).full) fullCount++; }
  const dueSoFar = Math.max(0, Math.min(diaPrograma, PROG_DIAS));
  const adh = dueSoFar>0 ? Math.round(fullCount/dueSoFar*100) : 0;
  let streak=0;
  let start = (diaPrograma>=1 && estadoDia(diaPrograma).full) ? diaPrograma : diaPrograma-1;
  for(let d=start; d>=1 && estadoDia(d).full; d--) streak++;

  document.getElementById('racha').textContent = fullCount;
  document.getElementById('hsFull').textContent = fullCount;
  document.getElementById('hsAdh').textContent = adh+'%';
  document.getElementById('hsRacha').textContent = streak;
  document.getElementById('totalDias').textContent = `${dueSoFar} de ${PROG_DIAS} días`;

  const semanas = Math.ceil(PROG_DIAS/7);
  let html='';
  for(let w=1; w<=semanas; w++){
    html += `<div class="heat-wk">S${w}</div>`;
    for(let pos=0; pos<7; pos++){
      const d=(w-1)*7+pos+1;
      if(d>PROG_DIAS){ html+='<div></div>'; continue; }
      const ds=dsDia(d); const ddmm=ds.slice(8)+'/'+ds.slice(5,7);
      if(d>diaPrograma){ html+=`<div class="cell future" title="Día ${d} · ${ddmm} · próximo"></div>`; continue; }
      const s=estadoDia(d);
      const cls = s.full?'full':(s.partial?'partial':'none');
      const today = d===diaPrograma?' today':'';
      html+=`<div class="cell ${cls}${today}" title="Día ${d} · ${ddmm} · ${s.tk} de ${s.exp} tomas"></div>`;
    }
  }
  document.getElementById('heatGrid').innerHTML = html;
}

function completarDia(){
  const plan = tomasDeHoy(diaPrograma);
  plan.items.forEach(it=> setMark(`${HOY}:${it.meal}:${it.id}`,'1'));
  render();
}
function reiniciar(){
  if(confirm('Esto borra tu progreso en TODOS tus dispositivos. Seguro?')){
    const m = metaLoad(); const now = Date.now();
    Object.keys(localStorage).filter(k=>DKEY.test(k)).forEach(k=>{ localStorage.removeItem(k); m[k]=now; });
    metaSave(m);
    if(cloudOn()) fullSync().finally(()=>location.reload());
    else location.reload();
  }
}
document.getElementById('ver').textContent = 'Versión 3 · ' + HOY;
render();
fullSync();
</script>
